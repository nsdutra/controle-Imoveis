<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RUMO - Controle de Imóveis</title>
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://cdn.jsdelivr.net/npm/html2canvas-pro@1.5.11/dist/html2canvas-pro.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        @import url('https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&display=swap');
        .assinatura-style { font-family: 'Dancing Script', cursive; font-size: 24px; }
    </style>
</head>
<body class="bg-gray-100 font-sans text-gray-800 pb-16">

    <!-- Splash Screen -->
    <div id="splash-screen" class="fixed inset-0 bg-slate-900 z-55 flex flex-col items-center justify-center text-white p-6 transition-opacity duration-500">
        <div class="w-full max-w-sm text-center space-y-6 flex flex-col justify-between h-full py-8">
            <div></div>
            <div class="space-y-6">
                <h1 class="text-5xl font-black tracking-widest text-blue-400">RUMO</h1>
                <button onclick="entrarNoSistema()" class="w-full bg-blue-600 py-3 rounded-xl font-bold">Acessar Sistema</button>
            </div>
            <div class="text-2xs text-slate-500 font-mono">Versão v3.6.5</div>
        </div>
    </div>

    <!-- Header -->
    <header id="main-header" class="hidden bg-slate-900 text-white sticky top-0 z-50">
        <div class="p-3 flex justify-between items-center bg-slate-950">
            <span class="text-lg font-black text-blue-400">RUMO 🏠</span>
            <button onclick="voltarParaSplash()" class="text-xs bg-slate-800 px-2 py-1 rounded">Sair</button>
        </div>
        <nav class="flex overflow-x-auto text-center text-xs font-medium border-t border-slate-800">
            <button onclick="switchTab('tab-imoveis')" class="flex-none px-4 py-3 border-b-2 border-blue-400" id="btn-tab-imoveis">Imóveis</button>
            <button onclick="switchTab('tab-contratos')" class="flex-none px-4 py-3" id="btn-tab-contratos">Contratos</button>
            <button onclick="switchTab('tab-mensal')" class="flex-none px-4 py-3" id="btn-tab-mensal">Mensal</button>
        </nav>
    </header>

    <main id="main-content" class="hidden p-4 max-w-md mx-auto">
        <!-- Conteúdo omitido para brevidade, mantenha a estrutura anterior aqui -->
        <section id="tab-imoveis" class="tab-content active">...</section>
        <section id="tab-contratos" class="tab-content">...</section>
        <section id="tab-mensal" class="tab-content">...</section>
    </main>

    <!-- Template de Recibo Otimizado -->
    <div id="pdf-wrapper" class="hidden fixed inset-0 bg-slate-900/90 z-100 flex flex-col p-2 overflow-y-auto">
        <div class="bg-white max-w-sm mx-auto w-full p-6 shadow-2xl">
            <div id="pdf-template" style="font-family: Arial, sans-serif; color: #333; line-height: 1.2;">
                <!-- Header compacto -->
                <div style="border-bottom: 2px solid #1a365d; margin-bottom: 10px; padding-bottom: 5px;">
                    <div style="color: #1a365d; font-size: 16px; font-weight: 900;">RUMO</div>
                    <div style="font-size: 8px;">CNPJ: 18.661.505/0001-62</div>
                </div>

                <div style="font-size: 12px; margin-bottom: 15px;">
                    Confirmamos que o locatário <strong id="pdf-locatario">-</strong> efetuou o pagamento de <strong style="color:#2f855a;">R$ <span id="pdf-valor">0,00</span></strong> referente a <span id="pdf-mes">-</span>.
                </div>
                
                <table style="width: 100%; border-collapse: collapse; font-size: 10px; margin-bottom: 20px;">
                    <tr><td style="padding: 4px; border: 1px solid #ddd; background:#f9f9f9;">Endereço:</td><td id="pdf-endereco" style="padding: 4px; border: 1px solid #ddd;">-</td></tr>
                    <tr><td style="padding: 4px; border: 1px solid #ddd; background:#f9f9f9;">Data:</td><td id="pdf-data" style="padding: 4px; border: 1px solid #ddd;">-</td></tr>
                </table>

                <div style="margin-top: 30px; text-align: center;">
                    <div class="assinatura-style" style="color: #1a365d;">Ruyter Carlos</div>
                    <div style="border-top: 1px solid #1a365d; width: 180px; margin: 0 auto; font-size: 10px; padding-top: 5px;">
                        Ruyter Carlos da Silva - Sócio
                    </div>
                </div>
            </div>
            <button onclick="document.getElementById('pdf-wrapper').classList.add('hidden')" class="mt-4 w-full bg-red-600 text-white p-2 rounded">Fechar</button>
        </div>
    </div>

    <script>
        // Lógica mantida e atualizada para versão v3.6.5
        function entrarNoSistema() {
            document.getElementById('splash-screen').classList.add('hidden');
            document.getElementById('main-header').classList.remove('hidden');
            document.getElementById('main-content').classList.remove('hidden');
        }
        // ... (resto do script)
    </script>
</body>
</html>
